quickstart:
  heading: "install"
  lines:
    - { kind: "cmt", text: "# zero install — run via npx" }
    - { kind: "cmd", text: "npx acptoapi" }
    - { kind: "cmt", text: "# default ports: :4800 (api), :4780 (kilo), :4790 (opencode)" }
    - { kind: "cmt", text: "# override flags: --port --kilo --opencode --claude-bin" }
    - { kind: "cmt", text: "# refresh local npx cache after publish" }
    - { kind: "cmd", text: "npx acptoapi --update" }
    - { kind: "cmt", text: "# multi-key per provider — works out of the box" }
    - { kind: "cmd", text: "export GROQ_API_KEY=key-a   GROQ_API_KEY_2=key-b   GROQ_API_KEY_3=key-c" }

