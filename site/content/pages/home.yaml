id: home
title: Home

hero:
  heading: "acptoapi"
  subheading: "OpenAI-compat facade over ACP + Anthropic + 17 brand providers"
  body: "Point any OpenAI SDK at it. Requests route by model prefix to Kilo, opencode, Claude Code CLI, Anthropic, Gemini, Ollama, Bedrock, Groq, OpenRouter, Together, DeepSeek, xAI, Cerebras, Mistral, Fireworks, OpenAI, Sambanova, NVIDIA, Cloudflare, Z.AI, Qwen, Codestral, opencode-zen, Cohere, Perplexity. Real token-by-token SSE. Tool calls preserved. Multi-key per provider with rotation + exponential backoff."
  badges:
    - { label: "streaming" }
    - { label: "tool_calls" }
    - { label: "reasoning_content" }
    - { label: "multi-key" }
    - { label: "auto-chain" }
    - { label: "openai-compat" }
    - { label: "anthropic-compat" }
    - { label: "gemini-compat" }
  ctas:
