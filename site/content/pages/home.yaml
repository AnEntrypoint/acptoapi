api_exports:
  heading: "endpoints"
  count: "18 routes"
  items:
    - { code: "POST",  title: "/v1/chat/completions",                              sub: "OpenAI chat — streaming + non-streaming",         meta: "openai-compat", href: "https://github.com/AnEntrypoint/acptoapi#endpoints" }
    - { code: "GET",   title: "/v1/models",                                        sub: "live-probed model list with queues",              meta: "openai-compat" }
    - { code: "POST",  title: "/v1/messages",                                      sub: "Anthropic Messages API drop-in",                  meta: "anthropic-compat" }
    - { code: "POST",  title: "/v1/messages/count_tokens",                         sub: "heuristic token estimator",                       meta: "anthropic-compat" }
    - { code: "POST",  title: "/v1/embeddings",                                    sub: "prefix-routed embeddings",                        meta: "openai/cohere/voyage/mistral" }
    - { code: "POST",  title: "/v1/images/generations",                            sub: "image generation passthrough",                    meta: "openai/together" }
    - { code: "POST",  title: "/v1/moderations",                                   sub: "moderation passthrough",                          meta: "openai" }
    - { code: "POST",  title: "/v1/rerank",                                        sub: "rerank passthrough",                              meta: "cohere/voyage/together" }
    - { code: "POST",  title: "/v1/audio/speech",                                  sub: "TTS passthrough",                                 meta: "openai/groq" }
    - { code: "POST",  title: "/v1beta/models/:m:streamGenerateContent",           sub: "Gemini streaming",                                meta: "gemini-compat" }
    - { code: "POST",  title: "/v1beta/models/:m:generateContent",                 sub: "Gemini non-streaming",                            meta: "gemini-compat" }
    - { code: "GET",   title: "/v1/keyring/status",                                sub: "masked per-key state, rotation + backoff",        meta: "ops" }
    - { code: "GET",   title: "/v1/sampler/status",                                sub: "per-provider backoff state",                      meta: "ops" }
    - { code: "GET",   title: "/v1/runs",                                          sub: "chain run history",                               meta: "ops" }
    - { code: "GET",   title: "/v1/chains",                                        sub: "named + runtime chains",                          meta: "ops" }
    - { code: "GET",   title: "/debug/providers",                                  sub: "live backend probe",                              meta: "debug" }
    - { code: "GET",   title: "/debug/auto-chain",                                 sub: "current resolved auto-fallback chain",            meta: "debug" }
    - { code: "GET",   title: "/health",                                           sub: "backend status",                                  meta: "ops" }

features:
  heading: "how it works"
  items:
    - { code: "01", name: "messages[] → backend native", desc: "OpenAI/Anthropic/Gemini bodies translated to ACP text parts or Claude Code -p prompts",  meta: "translate.js" }
    - { code: "02", name: "text deltas → delta.content", desc: "one SSE frame per token, no buffering, no polling — first chunk in ms",                meta: "stream" }
    - { code: "03", name: "reasoning → reasoning_content",desc: "Anthropic thinking + OpenAI reasoning passed through as delta.reasoning_content",     meta: "reasoning" }
    - { code: "04", name: "tool_calls preserved",        desc: "OpenAI delta.tool_calls with input JSON accumulated from streamed input_json_delta",   meta: "tool-use" }
    - { code: "05", name: "tool_results folded in",      desc: "Claude agentic loop tool_result blocks rendered into delta.content with marker",       meta: "agentic" }
    - { code: "06", name: "multi-key rotation",          desc: "GROQ_API_KEY + GROQ_API_KEY_1..99 — rotate inline on 401/429 before chain advances",   meta: "keyring.js" }
    - { code: "07", name: "per-provider backoff",        desc: "sampler hourly probes; failed providers fall to the back of the chain with exp backoff",meta: "sampler.js" }
    - { code: "08", name: "auto-fallback chain",         desc: "model: 'auto' walks env-detected providers ranked by SWE-bench, then ACP daemons",     meta: "auto-chain.js" }
    - { code: "09", name: "named chains",                desc: "fast, cheap, smart, reasoning, free, local — model: 'fast' picks first available",     meta: "chains" }
    - { code: "10", name: "claude CLI sandboxed",        desc: "spawned in tempdir — no tools, no MCP, no skills, no hooks — pure prompt → text",      meta: "claude-cli" }
    - { code: "11", name: "session end → finish_reason", desc: "stop | length | tool_calls then [DONE]",                                                meta: "stream" }
    - { code: "12", name: "ACP daemons auto-spawn",      desc: "kilo, opencode, gemini-cli, qwen-code, codex-cli, copilot-cli, cline, hermes, cursor, codeium, acp-cli — installless via npx/bunx", meta: "acp-launcher.js" }

examples:
  heading: "sdk drop-in"
  items:
    - { code: "js",  title: "OpenAI SDK",           sub: "baseURL → :4800/v1, apiKey=none, stream:true",        meta: "openai",     href: "https://github.com/AnEntrypoint/acptoapi#sdk" }
    - { code: "py",  title: "Anthropic SDK",        sub: "base_url → :4800, POST /v1/messages",                 meta: "anthropic",  href: "https://github.com/AnEntrypoint/acptoapi#anthropic" }
    - { code: "js",  title: "Gemini SDK",           sub: "POST /v1beta/models/:m:streamGenerateContent",        meta: "gemini",     href: "https://github.com/AnEntrypoint/acptoapi#gemini" }
    - { code: "cli", title: "Claude Code CLI",      sub: "ANTHROPIC_BASE_URL=:4800 claude -p '...'",            meta: "claude",     href: "https://github.com/AnEntrypoint/acptoapi#claude-cli" }

