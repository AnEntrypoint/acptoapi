- id: root-cause-windows-spawn
  claim: Windows daemon spawn used PowerShell Start-Process which exits immediately instead of detaching
  witness_method: exec:nodejs import and test
  witness_evidence: |
    Testing with old PowerShell Start-Process approach: kilo exited with code 1 immediately on all 4 spawn attempts.
    Testing with simplified detached spawn (stdio: 'ignore', detached: true): kilo spawned successfully as PID 4412.
    Root cause: PowerShell Start-Process with stdio redirection to file was closing before daemon detached, causing immediate exit.
  status: witnessed
- id: fix-windows-spawn-applied
  claim: Replaced Windows spawn logic with simpler detached process spawning
  witness_method: exec:nodejs test
  witness_evidence: |
    After fix in lib/acp-launcher.js (spawnWindowsDaemon), kilo spawned successfully with PID 4412.
    New approach uses: spawn(command, args, { stdio: 'ignore', detached: true, shell: false })
    This allows child process to detach and outlive parent, which is the correct Windows daemon pattern.
  status: witnessed
