- id: server-anthropic-inbound
  subject: Expose Anthropic-native HTTP server endpoint (/v1/messages)
  status: pending
  description: Current server only exposes OpenAI /v1/chat/completions. Add /v1/messages that accepts Anthropic-format POST bodies, routes through translate() to any backend, and streams Anthropic SSE events back. Makes the bridge usable as an Anthropic-SDK drop-in.
  effort: medium
  category: feature
  route_family: boundary
  failure_modes:
    - Anthropic SSE requires event: lines not just data: lines
    - Multi-block content_block_start/stop sequencing must be correct
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: []
  acceptance:
    - POST /v1/messages accepts Anthropic request body
    - Streams anthropic SSE (event: message_start etc) when stream:true
    - Returns toResponse shape when stream:false
    - Respects x-api-key and Authorization headers for auth
  edge_cases:
    - Must send ping events to keep connection alive for slow models

