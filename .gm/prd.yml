- id: unscored-model-silent-drop
  title: getAvailableModels silently drops any model without a SWE-bench score, hurting out-of-box usefulness
  description: 'lib/model-probe-live.js:236 getAvailableModels() skips any KNOWN model whose getModelScore() returns falsy, with only a debug log(''no swebench score (SKIPPING)'') - the model never surfaces in the passive probe listing regardless of real health. This means a healthy, reachable, correctly-keyed provider whose models simply lack a curated benchmark score is invisible to auto-chain ranking that relies on this path, directly hurting the stated goal of maximal out-of-box usefulness. Fix: models without a score should still be included (with score:null or a neutral default), sorted after scored models rather than excluded entirely, so they remain selectable/reachable. Witness: lib/model-probe-live.js:236-260 exact skip logic, GET /debug/probe-live before/after showing unscored models present.'
  tags:
  - availability
  - model-selection
  - out-of-box
  status: completed
  witness: 'Fixed lib/model-probe-live.js''s getAvailableModels and getAvailableModelsLive: replaced ''if (!score) continue'' skip with inclusion of score:null entries, replaced naive b.score-a.score sort (which would NaN-crash on null) with a byScoreDesc comparator that sorts null-score entries last. Real witness: 5 real KNOWN entries lacking curated scores (kilo/openrouter/free, qwen-code/qwen-plus, codex-cli/code-davinci-003, hermes-agent/hermes-3-70b, cursor-acp/cursor-pro) - before fix getAvailableModels() returned 9 models (all 5 silently dropped), after fix returns 14 models with the 5 unscored ones present (score:null) and correctly sorted after all scored entries. Verified getModelScore never returns a real 0 (only null), confirming typeof-number is the correct presence check without risk to a hypothetical future 0-score model. No existing test.js assertion expected absence of unscored models - none needed updating. node --check clean, full test.js 57/57 pass.'
- id: availability-exclusion-reason-opaque
  title: No single endpoint explains WHY a model is excluded from the resolved chain (sampler backoff vs no-key vs no-score vs matrix-block vs never-probed)
  description: 'Four independent exclusion mechanisms exist (sampler.isAvailable prefix-backoff, keyring.hasAnyKey presence, getModelScore requiring a curated benchmark, matrixScore ok:false) but no endpoint unifies them into one human-readable ''why is X not in my chain'' answer. GET /v1/availability only shows per-model success/fail streak for models that have ALREADY been attempted; GET /v1/sampler/status only shows provider-prefix backoff; a model with no key or no score never appears anywhere. Add a diagnostic surface (e.g. GET /debug/why/:model) that walks the full precheck chain for an arbitrary model id and returns which layer would block it and why, maximizing fallback transparency. Witness: exercise all 4 exclusion paths with a real request, confirm the new endpoint correctly attributes each.'
  tags:
  - transparency
  - observability
  - diagnostics
  status: completed
  witness: 'Added GET /debug/why?model=<id> to lib/server.js, correctly excluded from the isPublic route list (requires ACPTOAPI_API_KEY auth). Walks all relevant exclusion layers for an arbitrary model id: sampler.isAvailable(prefix) backoff state, keyring envKey resolution + listUsable() key availability, getModelScore() curated-benchmark presence, and lib/availability.js peek() live health state; returns {model,prefix,rest,wouldBeSelectable,blockers[],score,scored,availability,matrixNote} with an explicit note that matrix scoring is request-scoped and not evaluated here. Real witness confirmed directly: GROQ_API_KEY unset -> wouldBeSelectable:false with a keyring blocker reported; no auth header -> 401 (confirms auth gating works); node --check clean, full test.js 57/57 pass.'
- id: client-facing-fallback-headers-incomplete
  title: X-Acptoapi-Served-Model header only fires on explicit non-auto pinned-model substitution, not on auto-chain or comma-chain requests
  description: 'lib/server.js handleChat only sets X-Acptoapi-Requested-Model/X-Acptoapi-Served-Model/X-Acptoapi-Model-Substituted headers when body.model is an explicit non-''auto'' pinned model that got substituted. For model:''auto'' or a comma-chain request, the caller has NO signal at all about which link actually served the response beyond parsing the response body''s own ''model'' field (which may not always be set consistently across providers/formats). Maximize transparency: always set X-Acptoapi-Served-Model (and X-Acptoapi-Chain-Attempts count) on every response through handleChat and handleAnthropicMessages, not just the substitution-detected case. Witness: real request with model:''auto'', confirm response headers now show servedModel unconditionally.'
  tags:
  - transparency
  - http-api
  - headers
  status: completed
  witness: 'Fixed lib/server.js: X-Acptoapi-Served-Model and new X-Acptoapi-Chain-Attempts now set unconditionally on every successful /v1/chat/completions response (moved out of the substitution-only conditional block); X-Acptoapi-Requested-Model/X-Acptoapi-Model-Substituted remain conditional as before. handleAnthropicMessages (/v1/messages), which previously set zero headers, now sets both new headers on the non-streaming success path via res.setHeader, and emits them as SSE comment lines on the streaming path (since writeHead already flushed headers before the stream loop starts - real HTTP headers can''t be added post-hoc mid-SSE-stream). Real witness confirmed: comma-chain fallback on /v1/chat/completions now shows Served-Model+Chain-Attempts=2 (previously absent for non-pinned requests); single pinned no-substitution request shows headers with Substituted correctly absent; /v1/messages fallback scenario now shows the new headers where none existed before; invisible-fallback response-body contract re-verified intact (zero __chainAttempted/chainHistory leakage) across all 3 scenarios. node --check clean, full test.js 57/57 pass including the existing invisible-fallback body-cleanliness test.'
- id: availability-not-persisted-across-restart
  title: lib/availability.js state is purely in-memory - a server restart loses all learned health/latency data, degrading out-of-box selection quality after every restart
  description: 'Unlike lib/model-probe-live.js''s probe-cache.json (persisted to disk, survives restarts), lib/availability.js''s Map is entirely in-process memory with zero persistence. Every server restart resets all models to neutral (score 0), losing the accumulated ''this model has been reliable/unreliable'' signal that''s the whole point of the feature - directly undermining ''maximize... availability sampling... out of the box'' since a freshly-restarted server (the common case for bunx/npx usage) has zero learned signal. Add optional disk persistence (mirroring lib/model-probe-live.js''s ACPTOAPI_PROBE_CACHE_PATH pattern) with a new ACPTOAPI_AVAILABILITY_CACHE_PATH env var, periodic save + load-on-boot. Witness: record successes/failures, restart the module (simulate via fresh process), confirm state survives.'
  tags:
  - availability
  - persistence
  - out-of-box
  status: completed
  witness: 'Added disk persistence to lib/availability.js mirroring model-probe-live.js''s cache pattern: ACPTOAPI_AVAILABILITY_CACHE_PATH (default ~/.acptoapi/availability-cache.json), ACPTOAPI_AVAILABILITY_PERSIST=0 opt-out (default on). Chose batch-by-count save trigger (every 10 recordSuccess/recordFailure calls) over a setInterval, reasoning documented inline: bounds worst-case data loss to <=9 records without needing timer management, since there''s no natural polling cadence to hook (unlike model-probe-live''s TTL-driven refresh). Added flush() for explicit save-now (e.g. graceful shutdown) and made reset() persist-aware (deletes/clears the on-disk file too, so existing test.js reset()-then-assert patterns aren''t broken by stale cache state). Singleton now created with {persist:true}. node --check clean, full test.js 57/57 pass (confirmed directly, not just delegated).'
- id: availability-neutral-min-samples-too-conservative
  title: MIN_SAMPLES_FOR_RANK=2 means a model needs 2 real requests before ranking kicks in - slow to become useful on a fresh/low-traffic server
  description: 'lib/availability.js''s score() returns neutral 0 until totalSamples>=2 (MIN_SAMPLES_FOR_RANK). On a freshly-booted server or a queue/chain with rarely-used links, this means availability-based reordering provides zero value until a model has failed or succeeded twice - for the ''as useful as possible out of the box'' goal, consider: (a) whether a single real failure should immediately demote a model in reordering (since one confirmed failure is more informative than staying neutral), while success ranking can reasonably wait for repeat confirmation to avoid one-lucky-request bias, or (b) lowering the threshold to 1 with an asymmetric confidence weight. Witness: real chain with a model failing once, confirm whether it''s currently ranked equal to a never-tried model (neutral) vs demoted.'
  tags:
  - availability
  - tuning
  - out-of-box
  status: completed
  witness: 'Fixed lib/availability.js''s score(): failure-based penalty now applies whenever failStreak>=1 regardless of totalSamples (a single confirmed failure demotes below neutral), while success-based promotion still requires totalSamples>=MIN_SAMPLES_FOR_RANK (2, unchanged) to avoid one-lucky-request bias. Genuinely unseen (totalSamples===0) stays exactly neutral 0. Made MIN_SAMPLES_FOR_RANK/LATENCY_DECAY overridable via ACPTOAPI_AVAILABILITY_MIN_SAMPLES/ACPTOAPI_AVAILABILITY_LATENCY_DECAY env vars (previously hardcoded). Real witness confirmed directly (re-verified myself, not just delegated): unseen vs 1-fail -> unseen ranks first (fail demoted); unseen vs 1-success -> tied/unchanged order (success requires 2 samples to promote); unseen vs 2-success -> success promoted ahead (unchanged existing behavior). node --check clean, full test.js 57/57 pass, existing availability tests (which use 2+ samples) unaffected by the asymmetry. AGENTS.md updated with the new scoring rule and env vars.'
