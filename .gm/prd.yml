- id: agents-md-live-probe-doc-drift
  title: AGENTS.md's Live model probe section doesn't match real lib/model-probe-live.js implementation
  description: 'Discovered during live-model-probe audit: AGENTS.md describes lib/model-probe-live.js as fetching each provider''s /models endpoint dynamically, chat-probing up to ACPTOAPI_PROBE_CAP (default 100) models, with ACPTOAPI_DISABLE_PROBE and ACPTOAPI_PROBE_CONCURRENCY knobs and an isFresh() staleness check. The real implementation uses a static curated KNOWN dictionary (not a dynamic /models fetch), and none of ACPTOAPI_PROBE_CAP, ACPTOAPI_DISABLE_PROBE, ACPTOAPI_PROBE_CONCURRENCY, or isFresh() exist anywhere in the codebase (confirmed via repo-wide grep). Fix: rewrite the AGENTS.md ''Live model probe'' section to accurately describe the real KNOWN-dictionary-based approach, real env vars (ACPTOAPI_PROBE_TTL_MS, ACPTOAPI_PROBE_CACHE_PATH, ACPTOAPI_LIVE_PROBE), and the newly-fixed force=1/x-live-probe header behavior. Witness: grep each documented env var/function name against lib/model-probe-live.js to confirm real vs stale.'
