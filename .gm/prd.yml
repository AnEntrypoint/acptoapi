- id: test-js-hangs-does-not-exit
  title: test.js hangs indefinitely on unmodified main - process never exits
  description: 'Witnessed: `git stash` to unmodified main, `node test.js` with a 40s timeout never completes (exit 143/terminated), both before and independent of the availability/invisible-fallback work in this session. Likely cause: ACP daemon autolaunch spawning real child processes (kilo/opencode/qwen-code/codex-cli attempts visible in server boot logs) or sampler.startSampler''s un-uref''d interval, or a lingering open HTTP server/socket from realBackendSuite not calling server.close() on every path. Fix: ensure every server started in test.js is closed, ACP autolaunch is disabled for the whole test run (not just individual server instances), and the process exits cleanly (verify via explicit process.exit or unref all timers/handles). Witness: node test.js completes within 30s and exits 0/1 without needing an external timeout kill.'
  tags:
  - test
  - reliability
  - bug
  status: completed
  witness: 'Root cause found via process-of-elimination: (1) lib/server.js''s `activityInterval` setInterval (periodic activity summary, 60s) had no .unref() - fixed by adding `if (activityInterval.unref) activityInterval.unref();` after its declaration; (2) test.js''s new HTTP integration tests used a non-existent env var ACPTOAPI_DISABLE_ACP_AUTOLAUNCH (no-op) instead of the real ACPTOAPI_ENABLE_ACP_AUTOLAUNCH=0, so real ACP daemon autolaunch fired and spawned real child processes for every createServer() call in the suite - fixed by setting ACPTOAPI_ENABLE_ACP_AUTOLAUNCH=0 and ACPTOAPI_DISABLE_PROBE=1 globally at the top of test.js before any lib/server.js require, and removing the redundant/wrong per-test env sets. pretest.js and sampler.js timers were already correctly unref''d (not the cause). Witness: `timeout 40 node test.js` now completes and exits 0 with ''55 tests: 55 passed, 0 failed'' printed, no external timeout kill needed (previously hung past 40s on unmodified main via git-stash verification).'
