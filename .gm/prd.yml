  description: 'Noticed during HTTP API surface audit: POST /debug/translate with an empty {} body returns 500 (internal error) instead of a client-facing 400 with a validation hint, since it''s a missing-required-field case not an internal failure. Fix: validate from/to/provider are present before invoking translate(), return 400 {code:''missing_field'', hint} matching the existing jsonErr convention used elsewhere in server.js. Witness: real fetch POST /debug/translate with empty body currently returns 500; after fix should return 400.'
  tags:
  - api
  - validation
  - bug
  status: completed
  witness: 'Fixed lib/server.js''s /debug/translate handler: validates from/to/provider present before calling translate(), returns 400 {code:''missing_field''} matching existing jsonErr convention (verified via grep against other 400 call sites in the file). Real-server witness confirmed: empty {} body now returns 400 missing_field (previously 500); a well-formed body with all 3 fields present proceeds past the new validation into the normal translate() path (failed downstream on an unrelated provider-registry gap in this sandbox, confirming no false-positive). node --check + full test.js (55/55) confirm no regression.'
- id: agents-md-model-resolver-file-drift
  title: AGENTS.md 'model-resolver.js + dynamic defaults' section describes wrong file locations
  description: 'Noticed during model-resolver-coverage audit: AGENTS.md''s section on resolveModel/resolveQueue/splitBrandModel describes them as living in lib/model-resolver.js, but that file is actually a different module (probes live models per-provider, caches to ~/.acptoapi/models-cache.json). The real resolveModel/splitPrefix live in lib/sdk.js, resolveQueue lives in lib/queues.js, splitBrandModel is duplicated independently in lib/server.js and lib/passthrough.js. Fix: correct the file:line citations in AGENTS.md''s relevant section to point to the real locations. Witness: grep each function name across lib/ to confirm real definition sites, edit AGENTS.md citations to match.'
