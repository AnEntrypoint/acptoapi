- id: acp-hasProvider-opt-in-gating
  subject: Fix hasProvider to exclude ACP daemons when ACPTOAPI_ENABLE_ACP is not set
  description: 'hasProvider() at lib/auto-chain.js:146-154 lists ACP daemons and always returns true when no daemons are live yet. This allows buildAutoChainLive() to attempt ACP model refresh even when ACPTOAPI_ENABLE_ACP is unset, and allows buildAutoChain() to include ACP daemon model links despite the second-pass filter (line 238). Fix: in hasProvider, add check for ACPTOAPI_ENABLE_ACP === ''1'' for non-ollama ACP daemons, returning false when the env var is not set.'
  tags:
  - acp
  - opt-in
  - correctness
  status: completed
  witness: 'hasProvider() now checks ACPTOAPI_ENABLE_ACP !== ''1'' before returning true for non-ollama ACP daemons. Verified with node -e: unset env var -> 0 ACP daemons in available set; ACPTOAPI_ENABLE_ACP=1 -> 10 ACP daemons included. Pushed commit d49db7c. Also gated server boot-time ensureRunning call (server.js:1559) with same check; pushed commit b57e07f.'
