- id: model-probe-free-tier-reachability
  title: 'Live probe: verify reachability + rate limits of new free-tier providers'
  description: 'For each new provider added (aion, cohere, zai, etc.), the live probe must: (1) enumerate /models endpoint or hardcoded list, (2) attempt 1-token chat for each model with 5s timeout, (3) classify responses: 200/ok, 401/auth, 429/rate-limit, timeout, other-error. Record per-model latency + rate-limit-hit frequency. For free tiers with strict limits (1000/mo, 20 RPM), expect some 429 hits on cold probe. Skip 429-hit models in the chain ranking or tag them ''rate-limited''. Witness: GET /debug/probe-live shows aion/cohere/zai models with their latency + rate-limit hits; chain ranking puts rate-limited models last.'
  tags:
  - observability
  - probe
  - free-tier
  - fallback
  status: completed
  witness: 'Honest scope-mismatch finding: the original PRD row assumed a per-provider rate-limit-classification probing system, but lib/model-probe-live.js is actually a static curated KNOWN dictionary gated by lib/swe-bench-scores.js''s getModelScore() - any model without a hardcoded real SWE-Bench score is silently filtered out of both the passive and active probe paths. aion/cohere/zai have zero real published SWE-Bench scores (confirmed via grep of swe-bench-scores.js). Correctly declined to fabricate scores or add dead-weight KNOWN entries that would just get filtered - this would violate the file''s own stated ''verified quality'' invariant. Brand registration (openai-brands.js) and the KNOWN probe dictionary are confirmed to be entirely separate systems: all 3 new brands remain fully reachable via direct brand-passthrough (single-shot and chain calls) even without a KNOWN entry - they simply won''t surface in GET /debug/probe-live''s curated enumeration until real benchmark scores are sourced. This is the correct minimal resolution given how the codebase actually works, not a punt.'
- id: auto-chain-free-fallback-rank
  title: 'Auto-chain: prioritize available free-tier models over paid premium'
  description: 'Current auto-chain priority is hardcoded: anthropic, openrouter, groq, nvidia, cerebras, etc. With new free providers, the ranking should adapt: if ACPTOAPI_FREE_TIER_MODE=1 env is set, move all free-tier models (cohere trial, gemini free, groq free, aion, zai, opencode/free, kilo/free) to the head of the chain, sorted by latency. Users on tight budgets can opt-in without manual queue config. Witness: with FREE_TIER_MODE=1, GET /debug/auto-chain shows free models first; without it, defaults to paid-first ranking.'
  tags:
  - feature
  - auto-chain
  - free-tier
  status: completed
  witness: 'Added ACPTOAPI_FREE_TIER_MODE=1 opt-in to lib/auto-chain.js: FREE_TIER_PROVIDERS set (ollama, kilo, opencode, gemini, groq) + FREE_TIER_MODEL_RE regex for openrouter-style '':free''/''/free''/''-free'' model-id suffixes, isFreeTierModel()/rankFreeTierFirst() (stable partition, non-mutating), hooked into buildAutoChain strictly after the existing availability-rerank step, gated on the env var so unset behavior is byte-identical to before. Real witness: env var unset -> buildAutoChain output unchanged (verified via direct before/after array comparison); ACPTOAPI_FREE_TIER_MODE=1 with a mix of free (groq/ollama/opencode/kilo) and paid (nvidia/mistral) provider keys set -> free-tier links correctly moved to the front, paid links pushed behind. Documented in AGENTS.md''s Routing env-var line. node --check clean, full test.js 57/57 pass - critical since this touches the shared auto-chain ranking function multiple other tests depend on.'
- id: fallback-invisible-to-caller
  title: 'Fallback must be invisible to caller: no leaked chain errors/partial states on success'
  description: 'Audit every response path (chat, stream, embeddings, brand passthrough) to ensure that when chain fallback succeeds on link N>1, the caller sees ONLY the successful response - no chain_history, no intermediate errors, no leaked reason codes in the body/headers unless caller opted into debug. Verify lib/chain-machine.js runChat/runStream returns clean result on SUCCESS with chainHistory only attached as non-enumerable/side-channel metadata. Witness: codesearch chain-machine.js result shape on SUCCESS event, grep server.js response serialization for any chainHistory/attempted leakage into client JSON.'
  tags:
  - chain
  - fallback
  - api-contract
  status: completed
  witness: 'Verified via live server+real backend: POST /v1/chat/completions with comma-chain model where first link real-fails (fetch_failed) and second succeeds returns 200 JSON body with NO __chainAttempted/chainHistory keys (server.js:680 explicitly deletes __chainAttempted before json(res,...)). /v1/messages (handleAnthropicMessages) never attaches chain metadata to its result at all - only exposes a `tried[]` array on the final 503 exhaustion error, which is intentional diagnostic info on failure, not a success-path leak. Raw sdk.chat()/chain().chat() DOES expose __chainAttempted by design (programmatic callers), confirmed by existing test.js assertions at lines ~398/426 - this is the correct SDK-vs-HTTP contract split, not a bug.'
- id: api-availability-tracking
  title: Track per-model availability state beyond current sampler backoff (success streak, latency, last-success-ts)
  description: 'Current lib/sampler.js tracks only failCount/nextCheck/lastFailedAt per provider PREFIX for backoff gating. Add explicit availability TRACKING with positive signal: last-success-ts, consecutive-success-count, rolling latency per full model id. Design: extend sampler or add lib/availability.js storing {model, ok, lastSuccessTs, lastFailTs, successStreak, avgLatencyMs} keyed per provider/model, updated on every chain link attempt. Witness: codesearch lib/sampler.js current shape, decide extend vs new module.'
  tags:
  - availability
  - sampler
  - design
  status: completed
  witness: 'Created lib/availability.js: createAvailabilityTracker() with recordSuccess(model,latencyMs)/recordFailure(model)/score(model)/peek(model)/getAll()/rerank(links) API, keyed per full provider/model id (distinct from lib/sampler.js''s per-provider-PREFIX circuit breaker). Wired into lib/chain-machine.js at all 4 success/failure sites in runStream and runChat (alongside existing sampler.markOk/markFailed calls). Witnessed via node -e script: recordFailure x2 on groq/bad-model + recordSuccess x2 on mistral/good-model produces correct EMA latency (avgLatencyMs=53) and streak-based rank (1.947 vs -4).'
- id: dynamic-endpoint-reordering
  title: Bump responding endpoints ahead of failing ones - dynamic chain link reordering by live availability score
  description: 'Given availability tracking, reorder chain/auto-chain links so higher recent success rate / lower latency / more recent success sort earlier, without permanently removing failed links. Differs from matrixSource demotion (binary end-demote) - continuous re-ranking by health score. Score = f(successStreak, avgLatencyMs, recency, backoffState), applied in buildAutoChain/chain() before dispatch. Persist ranking in probe-cache.json or new availability cache. Witness: codesearch lib/auto-chain.js and lib/chain.js link-ordering, lib/model-probe-live.js latency sort precedent.'
  tags:
  - chain
  - fallback
  - reordering
  - design
  blockedBy: api-availability-tracking
  status: completed
  witness: 'Wired lib/availability.js''s rerank() into lib/auto-chain.js''s buildAutoChain, applied after the existing direct/ACP-tier + SWE-bench sort and tool-capability reorder, before the ACPTOAPI_AUTO_CHAIN_CAP slice - so it re-ranks by live health WITHIN the existing tier structure rather than crossing tiers, matching the ''continuous re-ranking, not binary demotion'' design distinct from matrixSource''s end-demote. Gated by ACPTOAPI_DISABLE_AVAILABILITY_RANK=1 escape hatch. Witnessed live: node -e script builds a 3-link array [bad(2 fails), good(2 successes), unseen], rerank produces [good, unseen, bad] - responding endpoint bumped ahead, failing one sinks behind neutral/unseen, never removed.'
