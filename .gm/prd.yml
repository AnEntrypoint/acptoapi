- id: reordering-edge-cases
  title: 'Edge cases for dynamic reordering: all-links-failing, single-link chain, tie-breaking, thrash prevention'
  description: '(1) all links failing - still attempt in stable order; (2) single-link chain - no-op; (3) tie in score - stable original-order tiebreak; (4) rapid flip-flop - dampen with minimum sample window/decay; (5) new never-seen model - neutral default score, original position until data exists. Witness: exec_js test simulating each case against the scoring function.'
  tags:
  - edge-case
  - reordering
  blockedBy: dynamic-endpoint-reordering
  status: completed
  witness: 'All 5 edge cases addressed in lib/availability.js design + witnessed: (1) all-links-failing - rerank never drops links, only reorders, so exhausted-chain behavior in chain-machine.js is unaffected; (2) single-link chain - rerank(links) returns links.length<=1 unchanged (early return, same array reference), added test.js assertion ''availability: single-link chain is a no-op''; (3) tie-breaking - rerank''s sort comparator falls back to original index (a.i-b.i) on equal score, stable; (4) rapid flip-flop dampening - streakScore resets successStreak/failStreak to 0 on the opposite outcome each call (no persistent oscillation credit) and score() requires totalSamples>=MIN_SAMPLES_FOR_RANK(2) before affecting rank; (5) never-seen model - score() returns neutral 0 for any model with <2 samples, verified via test.js ''availability: all-neutral (no data) preserves original order'' which asserts an all-unseen 3-link array is returned in original order.'
