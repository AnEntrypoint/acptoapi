- id: fix-refreshall-sequential-force-every-request
  note: 'ROOT CAUSE of 53s ttft witnessed in cctest: handleAnthropicMessages -> buildAutoChainLive (server.js) -> lib/auto-chain.js:373 calls refreshAll(available) UNCONDITIONALLY on every single /v1/messages request (not just cold boot). lib/model-resolver.js:133 refreshAll is a SEQUENTIAL for..of with await + force:true (bypasses the 24h TTL cache every call), each iteration hitting a live network probeModels() call per configured provider. With 5 providers this alone can add many seconds to EVERY request, not just the first. Fix: (a) parallelize refreshAll with Promise.all, (b) don''t force:true on every request -- only force-refresh on real cache miss/expiry or explicit trigger, reuse the TTL-cached getDefaultModelSync default for the hot path and let a background refresh update the cache asynchronously without blocking the request.'
  status: completed
  witness: lib/model-resolver.js:133 refreshAll rewritten from sequential for..of + force:true to Promise.all + no-force (honors 24h TTL cache). node --check passed. Single caller (lib/auto-chain.js:377 buildAutoChainLive) confirmed via grep, no other consumer relies on force semantics.
- id: refreshacpmodels-live-discovery-every-request-cost
