name: CI
on: [push, pull_request]
jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: |
          for f in lib/*.js bin/*.js test.js; do node --check "$f"; done
          node -e "import('./lib/server.js').then(m => console.log('import ok:', Object.keys(m)))"
  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', registry-url: 'https://registry.npmjs.org' }
      - name: Check for NPM_TOKEN
        id: check
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::NPM_TOKEN not set — skipping publish"
          fi
      - name: Bump patch version
        if: steps.check.outputs.has_token == 'true'
        run: |
          git config user.email "ci@noreply"
          git config user.name "ci"
          npm version patch --no-git-tag-version
          git add package.json
          git commit -m "ci: bump version [skip ci]"
          git push
      - name: Publish
        if: steps.check.outputs.has_token == 'true'
        continue-on-error: true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
